<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Placed - ShopEasy</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif; }
        body { background:#f5f5f5; display:flex; align-items:center; justify-content:center; min-height:100vh; }

        .success-card {
            background:white;
            border-radius:20px;
            padding:60px 40px;
            text-align:center;
            max-width:500px;
            width:100%;
            box-shadow:0 20px 60px rgba(0,0,0,0.1);
        }

        .success-icon { font-size:80px; margin-bottom:20px; }

        .success-card h1 {
            font-size:28px;
            font-weight:800;
            color:#2d3436;
            margin-bottom:10px;
        }

        .success-card p {
            color:#888;
            font-size:15px;
            margin-bottom:30px;
        }

        .btn-home {
            display:inline-block;
            background:linear-gradient(135deg, #f5af19, #f12711);
            color:white;
            padding:14px 30px;
            border-radius:25px;
            text-decoration:none;
            font-weight:700;
            font-size:15px;
            margin:8px;
        }

        .btn-orders {
            display:inline-block;
            background:white;
            color:#f12711;
            padding:14px 30px;
            border-radius:25px;
            text-decoration:none;
            font-weight:700;
            font-size:15px;
            border:2px solid #f12711;
            margin:8px;
        }

    * {
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Segoe UI', sans-serif;
    }

    body {
        background:#f5f5f5;
        display:flex;
        align-items:center;
        justify-content:center;
        min-height:100vh;
        padding:20px;
    }

    .success-card {
        background:white;
        border-radius:20px;
        padding:50px 30px;
        text-align:center;
        max-width:500px;
        width:100%;
        box-shadow:0 20px 60px rgba(0,0,0,0.1);
    }

    .success-icon {
        font-size:70px;
        margin-bottom:20px;
    }

    .success-card h1 {
        font-size:26px;
        font-weight:800;
        color:#2d3436;
        margin-bottom:10px;
    }

    .success-card p {
        color:#888;
        font-size:15px;
        margin-bottom:30px;
        line-height:1.5;
    }

    .btn-home,
    .btn-orders {
        display:inline-block;
        padding:14px 25px;
        border-radius:25px;
        text-decoration:none;
        font-weight:700;
        font-size:14px;
        margin:8px;
        transition:0.3s;
    }

    .btn-home {
        background:linear-gradient(135deg, #f5af19, #f12711);
        color:white;
    }

    .btn-orders {
        background:white;
        color:#f12711;
        border:2px solid #f12711;
    }

    /* 🔥 MOBILE RESPONSIVE */
    @media (max-width: 600px) {
    .success-icon {
        font-size: 70px;
        margin-bottom: 5px;
    }}      
    {

        .success-card {
            padding:35px 20px;
        }

        .success-icon {
    font-size: 100px;
    margin-bottom: 5px;
    line-height: 1;
}

        .success-card h1 {
            font-size:22px;
        }

        .success-card p {
            font-size:14px;
        }

        .btn-home,
        .btn-orders {
            display:block;
            width:100%;
            margin:10px 0;
        }
    }
    .success-card {
    animation: fadeIn 0.6s ease;
}

@keyframes pop {
    0% { transform: scale(0.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}
</style>

</head>
<body>
    <div class="success-card">
        <div class="success-icon">🎉</div>
        <h1>Order Placed Successfully!</h1>
        <p>Thank you for shopping with ShopEasy.<br>Your order is being processed.</p>
        <a href="/userhome/" class="btn-home">🛒 Continue Shopping</a>
        <a href="/my-orders/" class="btn-orders">📦 My Orders</a>
    </div>
</body>
</html>
