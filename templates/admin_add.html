<html>
    <head>
        <title>Add Product</title>
        <style>
body {
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

.header {
    background:#2c3e50;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
}

.container {
    padding:30px;
}

.form-box {
    background:white;
    padding:25px;
    border-radius:10px;
    max-width:700px;
    margin:auto;
}

.form-group {
    margin-bottom:15px;
}

label {
    display:block;
    font-weight:600;
    margin-bottom:5px;
}

input, textarea, select {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

textarea {
    height:100px;
}

.btn {
    width:100%;
    padding:12px;
    background:#6c63ff;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover {
    background:#574fd6;
}

.logout {
    color:white;
    text-decoration:none;
}
.table-section { padding:0 40px 40px; }
        .table-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .table-header h2 { font-size:20px; font-weight:700; color:#2d3436; }
        .total-badge { background:linear-gradient(135deg, #f5af19, #f12711); color:white; padding:6px 16px; border-radius:20px; font-size:13px; font-weight:600; }
        .table-wrapper { background:white; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,0.08); overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        thead { background:linear-gradient(135deg, #f5af19, #f12711); color:white; }
        thead th { padding:16px 20px; text-align:left; font-size:13px; font-weight:600; }
        tbody tr { border-bottom:1px solid #f0f0f0; transition:background 0.2s; }
        tbody tr:hover { background:#fff9f0; }
        tbody td { padding:14px 20px; font-size:14px; color:#2d3436; vertical-align:middle; }
        .sr-no { font-weight:700; color:#f12711; }
        .product-img { width:60px; height:60px; object-fit:cover; border-radius:10px; }
        .no-img { width:60px; height:60px; background:#f5f5f5; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:24px; }
        .badge-active   { background:#d4edda; color:#2ecc71; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
        .badge-inactive { background:#ffe0e0; color:#e74c3c; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
        .action-btns { display:flex; gap:8px; }
        .btn-edit   { display:inline-block; background:#2ecc71; color:white; padding:6px 14px; border-radius:8px; text-decoration:none; font-size:12px; font-weight:600; }
        .btn-delete { display:inline-block; background:#e74c3c; color:white; padding:6px 14px; border-radius:8px; text-decoration:none; font-size:12px; font-weight:600; }
        .empty-state { text-align:center; padding:50px 20px; color:#aaa; }
        .empty-icon  { font-size:50px; margin-bottom:12px; }

        .msg-error {
            background:#ffe0e0;
            color:#e74c3c;
            padding:10px 14px;
            border-radius:10px;
            font-size:20px;
            margin-bottom:18px;
            text-align:center;
        }

        .msg-success {
            background:#d4edda;
            color:#2ecc71;
            padding:10px 14px;
            border-radius:10px;
            font-size:20px;
            margin-bottom:18px;
            text-align:center;
        }
    </style>
    </head>
    <body>

    <div class="header">
    <h2>Admin Dashboard</h2>
    <a href="/admin-orders/" style="color:white; text-decoration:none; font-weight:500;">🧾 Orders</a>
    <a href="/adminhome/" style="color:white; text-decoration:none; font-weight:500;">🧾 Home</a>
    <a href="/logout/" class="logout">Logout</a>
    </div>
{% if messages %}
    {% for message in messages %}
        {% if message.tags == 'success' %}
                    <div class="msg-success">✅ {{ message }}</div>
                {% else %}
                    <div class="msg-error">❌ {{ message }}</div>
        {% endif %}
    {% endfor %}
{% endif %}
<div class="container">

    <div class="form-box">
        <h3>Add Product</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" required></textarea>
            </div>

            <div class="form-group">
                <label>Price</label>
                <input type="number" name="price" required>
            </div>

            <div class="form-group">
                <label>Discount Price</label>
                <input type="number" name="discount_price">
            </div>

            <div class="form-group">
                <label>Product Image</label>
                <input type="file" name="image" accept=".jpg, .jpeg, .webp, image/jpeg, image/webp" required>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <button class="btn">Add Product</button>
        </form>
    </div>

</div>

</body>
</html>
