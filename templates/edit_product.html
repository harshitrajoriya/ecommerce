<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Dashboard</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#f4f6f9;
}

.header {
    background:#2c3e50;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
}

.container {
    padding:30px;
}

.form-box {
    background:white;
    padding:25px;
    border-radius:10px;
    max-width:600px;
    margin:auto;
}

.form-group {
    margin-bottom:15px;
}

label {
    display:block;
    font-weight:600;
    margin-bottom:5px;
}

input, textarea, select {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

textarea {
    height:100px;
}

.btn {
    width:100%;
    padding:12px;
    background:#6c63ff;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover {
    background:#574fd6;
}

.logout {
    color:white;
    text-decoration:none;
}
.table-section { padding:0 40px 40px; }
        .table-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .table-header h2 { font-size:20px; font-weight:700; color:#2d3436; }
        .total-badge { background:linear-gradient(135deg, #f5af19, #f12711); color:white; padding:6px 16px; border-radius:20px; font-size:13px; font-weight:600; }
        .table-wrapper { background:white; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,0.08); overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        thead { background:linear-gradient(135deg, #f5af19, #f12711); color:white; }
        thead th { padding:16px 20px; text-align:left; font-size:13px; font-weight:600; }
        tbody tr { border-bottom:1px solid #f0f0f0; transition:background 0.2s; }
        tbody tr:hover { background:#fff9f0; }
        tbody td { padding:14px 20px; font-size:14px; color:#2d3436; vertical-align:middle; }
        .sr-no { font-weight:700; color:#f12711; }
        .product-img { width:60px; height:60px; object-fit:cover; border-radius:10px; }
        .no-img { width:60px; height:60px; background:#f5f5f5; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:24px; }
        .badge-active   { background:#d4edda; color:#2ecc71; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
        .badge-inactive { background:#ffe0e0; color:#e74c3c; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; }
        .action-btns { display:flex; gap:8px; }
        .btn-edit   { display:inline-block; background:#2ecc71; color:white; padding:6px 14px; border-radius:8px; text-decoration:none; font-size:12px; font-weight:600; }
        .btn-delete { display:inline-block; background:#e74c3c; color:white; padding:6px 14px; border-radius:8px; text-decoration:none; font-size:12px; font-weight:600; }
        .empty-state { text-align:center; padding:50px 20px; color:#aaa; }
        .empty-icon  { font-size:50px; margin-bottom:12px; }
    </style>


</head>

<body>


<div class="container">

    <div class="form-box">
        <h3>Update Product</h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" value="{{product.product_name}}" required>
            </div>

            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" value="{{product.product_title}}" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" required>{{product.product_description}}</textarea>
            </div>

            <div class="form-group">
                <label>Price</label>
                <input type="number" name="price" value="{{product.product_price}}" required>
            </div>

            <div class="form-group">
                <label>Discount Price</label>
                <input type="number" name="discount_price" value="{{product.product_discount_price}}">
            </div>

            <div class="form-group">
                <label>Product Image</label>
                {% if product.product_image %}
                <img src="{{ product.product_image.url }}" width="80" height="80"
                style="object-fit:cover; border-radius:8px; margin-bottom:8px; display:block;">
                {% endif %}
                <input type="file" name="image" >
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="active"   {% if product.product_status == 'active' %}selected{% endif %}>Active</option>
                    <option value="inactive" {% if product.product_status == 'inactive' %}selected{% endif %}>Inactive</option>
                </select>
            </div>

            <button class="btn">Update Product</button>
        </form>
    </div>

</div>

</body>
</html>
